# yaml-language-server: $schema=./seed.schema.json

# ============================================================================
# 1. ORGANIZATION TYPES
# ============================================================================
organization_types:
  - name: Institution
  - name: Department
    allowed_parents: [Institution]
  - name: Club
    allowed_parents: [Institution, Department]

# ============================================================================
# 2. ORGANIZATIONS
# ============================================================================
organizations:
  - name: TKM College of Engineering
    type: Institution
  - name: Computer Science Department
    type: Department
    parent: TKM College of Engineering
  - name: CSI TKMCE
    type: Club
    parent: Computer Science Department
  - name: Coding Club TKMCE
    type: Club
    parent: TKM College of Engineering
  - name: NSS Unit
    type: Club
    parent: TKM College of Engineering


# ============================================================================
# 3. VENUE TYPES
# ============================================================================
venue_types:
  - Auditorium
  - Ground / Courts
  - Parks
  - Labs
  - Seminar halls
  - Halls
  - Classrooms

# ============================================================================
# 4. FACILITIES
# ============================================================================
facilities:
  - A/C
  - Projector
  - Chairs
  - Computers
  - Chalkboard
  - Charging sockets
  - Smart TV
  - Dining
  - Sound system
  - Stage / platform
  - Desks / tables

# ============================================================================
# 5. VENUES
# ============================================================================
venues:
  - name: Main Auditorium
    type: Auditorium
    organization: TKM College of Engineering
    is_available: true
    max_capacity: 500
    facilities: [Projector, Sound system, A/C, Stage / platform]

  - name: Main Ground
    type: Ground / Courts
    is_available: false
    unavailability_reason: Under renovation
    max_capacity: 2000

# ============================================================================
# 6. ROLES & PERMISSIONS
# ============================================================================
roles:
  - name: Admin
    managed_entity_type: organization
    type_ref: Institution
    permissions:
      - organization:create
      - venue:create
      - user:create
      - role:modify_permissions
      - organization_type:create
      - venue_type:create
      - event_type:create
      - event_category:create

  - name: Office
    managed_entity_type: organization
    type_ref: Institution
    permissions:
      - organization:create
      - venue:create
      - user:create
      - venue:add_member
      - venue:modify_facilities
      - organization:add_member

  - name: Dean (Student Affairs)
    managed_entity_type: organization
    type_ref: Institution
    permissions:
      - event:manage

  - name: Placement Cell
    managed_entity_type: organization
    type_ref: Institution
    permissions:
      - event:manage

  - name: HOD
    managed_entity_type: organization
    type_ref: Department
    permissions:
      - event:manage
      - event:view_own

  - name: Faculty Coordinator
    managed_entity_type: organization
    type_ref: Club
    permissions:
      - event:manage
      - event:view_own
      - organization:add_member

  - name: Club head
    managed_entity_type: organization
    type_ref: Club
    permissions:
      - event:manage
      - event:view_own
      - event_organizer_invitation:respond

  - name: Venue in-charge
    managed_entity_type: venue
    type_ref: Auditorium

# ============================================================================
# 7. USERS & USER ROLE ASSIGNMENTS (SAMPLE)
# ============================================================================
users:
  - full_name: Alan SJ
    email: c3xxalan@tkmce.ac.in
    type: admin
    roles:
      - role: Club head
        managed_entity_type: organization
        entity_name: Coding Club TKMCE
