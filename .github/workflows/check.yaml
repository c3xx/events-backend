name: Check & test

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        name: "Lint & type-check"
        runs-on: "ubuntu-latest"
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - uses: pnpm/action-setup@v4
              name: Install pnpm
              with:
                  run_install: false

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: lts/*
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm ci --frozen-lockfile

            - name: Type-check & lint
              run: pnpm run check
    test:
        name: "Run tests"
        needs: check
        runs-on: "ubuntu-latest"
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - uses: pnpm/action-setup@v4
              name: Install pnpm
              with:
                  run_install: false

            - name: Install Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: lts/*
                  cache: "pnpm"

            - name: Install dependencies
              run: pnpm ci --frozen-lockfile

            - name: Type-check & lint
              run: pnpm run test run
